{% extends "base.html" %}
{% block content %}
<h2>🔌 Подключение к БД</h2>
<form method="post">
    <input name="host" placeholder="Host" required>
    <input name="port" value="5432" required>
    <input name="dbname" placeholder="DB name" required>
    <input name="user" placeholder="User" required>
    <input name="password" type="password" placeholder="Password">
    <br><br>
    <button>Подключиться</button>
</form>
{% endblock %}
